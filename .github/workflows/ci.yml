name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck

  test-server:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: dotstats_test
          POSTGRES_USER: dotstats
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: DotStats/server/package-lock.json
      - run: cd DotStats/server && npm ci
      - run: cd DotStats/server && npm test
        env:
          DATABASE_URL: postgresql://dotstats:testpassword@localhost:5432/dotstats_test
          REDIS_URL: redis://localhost:6379

  build-desktop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: cd DotStats && npm ci && npm run build

  build-and-release:
    runs-on: windows-latest
    needs: [lint-and-typecheck]
    if: >-
      github.event_name == "push" &&
      (github.ref == "refs/heads/main" || startsWith(github.ref, "refs/tags/v"))
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # ── DotTranslator ──
      - name: Install DotTranslator deps
        run: npm ci
      - name: Build DotTranslator
        run: npm run build
      - name: Package DotTranslator
        run: npx electron-builder --win --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── DotStats ──
      - name: Install DotStats deps
        run: cd DotStats && npm ci
      - name: Build DotStats
        run: cd DotStats && npm run build
      - name: Package DotStats
        run: cd DotStats && npx electron-builder --win --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Upload artifacts (every build) ──
      - name: Upload DotTranslator artifact
        uses: actions/upload-artifact@v4
        with:
          name: DotTranslator-Windows
          path: |
            dist/*.exe
            dist/*.exe.blockmap
          retention-days: 30

      - name: Upload DotStats artifact
        uses: actions/upload-artifact@v4
        with:
          name: DotStats-Windows
          path: |
            DotStats/dist/*.exe
            DotStats/dist/*.exe.blockmap
          retention-days: 30

      # ── GitHub Release (only on tag push) ──
      - name: Create GitHub Release
        if: startsWith(github.ref, "refs/tags/v")
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, "-beta") || contains(github.ref, "-rc") }}
          files: |
            dist/*.exe
            dist/*.exe.blockmap
            DotStats/dist/*.exe
            DotStats/dist/*.exe.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
