name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - run: npm run lint
      - run: npm run typecheck

  test-server:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: dotstats_test
          POSTGRES_USER: dotstats
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: DotStats/server/package-lock.json
      - run: cd DotStats/server && npm ci
      - run: cd DotStats/server && npm test
        env:
          DATABASE_URL: postgresql://dotstats:testpassword@localhost:5432/dotstats_test
          REDIS_URL: redis://localhost:6379

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build DotStats Server Docker image
        run: docker build -t dotstats-server:test ./DotStats/server
      - name: Verify Docker image runs
        run: |
          docker run -d --name dotstats-test \
            -e DB_PASSWORD=testpassword \
            -e ADMIN_API_KEY=testkey \
            -e INGEST_API_KEY=testingestkey \
            -p 3000:3000 \
            dotstats-server:test
          sleep 5
          # Health check should return 503 (degraded) without real PG/Redis,
          # but the container should start and respond
          curl -sf http://localhost:3000/api/v1/health || echo "Container started (expected degraded without DB)"
          docker logs dotstats-test
          docker stop dotstats-test

  build-desktop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - run: npm run build
      - run: cd DotStats && npm install && npm run build

  build-and-release:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win
            arch: x64
            artifact: Windows
          - os: macos-latest
            platform: mac
            arch: x64
            artifact: macOS
          - os: ubuntu-latest
            platform: linux
            arch: x64
            artifact: Linux
    runs-on: ${{ matrix.os }}
    needs: [lint-and-typecheck, test-server]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install & Build DotTranslator
        run: |
          npm install
          npm run build
          npx electron-builder --${{ matrix.platform }} --${{ matrix.arch }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install & Build DotStats
        run: |
          cd DotStats
          npm install
          npm run build
          npx electron-builder --${{ matrix.platform }} --${{ matrix.arch }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload DotTranslator artifact
        uses: actions/upload-artifact@v4
        with:
          name: DotTranslator-${{ matrix.artifact }}
          path: |
            dist/*
          retention-days: 30

      - name: Upload DotStats artifact
        uses: actions/upload-artifact@v4
        with:
          name: DotStats-${{ matrix.artifact }}
          path: |
            DotStats/dist/*
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          files: |
            dist/*
            DotStats/dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
