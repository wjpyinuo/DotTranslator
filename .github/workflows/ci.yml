name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-and-test:
    name: Build + Test
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore

      - name: Code Style (dotnet format)
        run: dotnet format --verify-no-changes --verbosity quiet
        continue-on-error: false

      - name: Build
        run: dotnet build -c Release --no-restore --warnaserror

      - name: Test
        run: dotnet test -c Release --no-build --logger "trx;LogFileName=test-results.trx" --collect:"XPlat Code Coverage" --results-directory ./coverage

      - name: Coverage Report
        uses: danielpalme/ReportGenerator-GitHub-Action@5.4.3
        with:
          reports: 'coverage/**/coverage.cobertura.xml'
          targetdir: 'coveragereport'
          reporttypes: 'HtmlSummary;Cobertura'

      - name: Coverage Gate (≥ 70%)
        run: |
          $coverage = Get-Content "coveragereport/Summary.txt" | Select-String "Line coverage:" | ForEach-Object { $_.ToString() -replace '[^\d.]', '' }
          Write-Host "Line coverage: $coverage%"
          if ([double]$coverage -lt 70) {
            Write-Error "Code coverage $coverage% is below 70% threshold"
            exit 1
          }

      - name: Security Scan
        run: dotnet list package --vulnerable --include-transitive

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            coverage/
            coveragereport/

  performance:
    name: Performance Benchmark
    runs-on: windows-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Run Benchmarks
        run: dotnet run -c Release --project benchmarks/Translator.Benchmarks -- --exporters json --filter "*"

      - name: Upload Benchmark Results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: BenchmarkDotNet.Artifacts/results/
