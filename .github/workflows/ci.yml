name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck

  test-server:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: dotstats_test
          POSTGRES_USER: dotstats
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: DotStats/server/package-lock.json
      - run: cd DotStats/server && npm ci
      - run: cd DotStats/server && npm test
        env:
          DATABASE_URL: postgresql://dotstats:testpassword@localhost:5432/dotstats_test
          REDIS_URL: redis://localhost:6379

  build-desktop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: cd DotStats && npm ci && npm run build

  build-windows:
    runs-on: windows-latest
    needs: [lint-and-typecheck]
    if: github.event_name == "push" && github.ref == "refs/heads/main"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Build DotTranslator
      - name: Install dependencies
        run: npm ci
      - name: Build DotTranslator
        run: npm run build
      - name: Package DotTranslator
        run: npx electron-builder --win --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Upload DotTranslator artifact
      - name: Upload DotTranslator
        uses: actions/upload-artifact@v4
        with:
          name: DotTranslator-Windows
          path: |
            dist/*.exe
            dist/*.exe.blockmap
          retention-days: 30

      # Build DotStats
      - name: Install DotStats dependencies
        run: cd DotStats && npm ci
      - name: Build DotStats
        run: cd DotStats && npm run build
      - name: Package DotStats
        run: cd DotStats && npx electron-builder --win --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Upload DotStats artifact
      - name: Upload DotStats
        uses: actions/upload-artifact@v4
        with:
          name: DotStats-Windows
          path: |
            DotStats/dist/*.exe
            DotStats/dist/*.exe.blockmap
          retention-days: 30
