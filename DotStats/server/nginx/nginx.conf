events {
    worker_connections 1024;
}

http {
  upstream api {
    server api:3000;
  }

  # 限流区 - 防止 API 被滥用
  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
  limit_req_zone $binary_remote_addr zone=admin_limit:10m rate=5r/s;
  limit_conn_zone $binary_remote_addr zone=ws_conn:10m;

  # 日志格式
  log_format main '$remote_addr - $remote_user [$time_local] '
                  '"$request" $status $body_bytes_sent '
                  '"$http_referer" "$http_user_agent" '
                  'rt=$request_time';

  server {
    listen 80;
    server_name _;

    # =============================================
    # SSL 配置（取消注释并填入证书路径即可启用）
    # =============================================
    # listen 443 ssl http2;
    # ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    # ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    # ssl_protocols       TLSv1.2 TLSv1.3;
    # ssl_ciphers         HIGH:!aNULL:!MD5;
    # ssl_prefer_server_ciphers on;
    # ssl_session_cache   shared:SSL:10m;
    # ssl_session_timeout 10m;
    #
    # # HTTP → HTTPS 重定向
    # server {
    #     listen 80;
    #     server_name _;
    #     return 301 https://$host$request_uri;
    # }

    # 安全头
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # Admin API - 更严格的限流（须在 /api/ 前面以确保匹配）
    location /api/v1/admin/ {
      limit_req zone=admin_limit burst=5 nodelay;

      proxy_pass http://api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API - 带限流
    location /api/ {
      limit_req zone=api_limit burst=20 nodelay;

      proxy_pass http://api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_connect_timeout 10s;
      proxy_read_timeout 30s;
    }

    # WebSocket
    location /ws {
      limit_req zone=api_limit burst=10 nodelay;
      limit_conn ws_conn 5;

      proxy_pass http://api;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_read_timeout 86400;
    }

    # Health
    location /health {
      proxy_pass http://api/api/v1/health;
    }

    # 默认
    location / {
      return 200 '{"status":"DotStats Analytics Server"}';
      add_header Content-Type application/json;
    }
  }
}
