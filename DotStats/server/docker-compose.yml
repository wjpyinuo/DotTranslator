services:
  api:
    build: .
    ports:
      - '3000:3000'
    environment:
      - DATABASE_URL=postgresql://dotstats:${DB_PASSWORD}@db:5432/dotstats
      - REDIS_URL=redis://redis:6379
      - PORT=3000
      - LOG_LEVEL=info
      - ADMIN_API_KEY=${ADMIN_API_KEY}
      - INGEST_API_KEY=${INGEST_API_KEY}
      - WS_TOKEN=${WS_TOKEN}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/api/v1/health']
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      POSTGRES_DB: dotstats
      POSTGRES_USER: dotstats
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    expose:
      - '5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U dotstats -d dotstats']
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    expose:
      - '6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:80/health']
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  pgdata:
